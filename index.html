<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biên Niên Sử Việt - Hành Trình Di Sản</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@300;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #f0d060;
            --gold-dim: rgba(212,175,55,0.15);
            --red: #8B0000;
            --ink: #1a1a1a;
            --paper: #f4f1ea;
            --zinc-100: #f4f4f5;
            --zinc-200: #e4e4e7;
            --zinc-400: #a1a1aa;
            --zinc-700: #3f3f46;
            --zinc-800: #27272a;
            --zinc-900: #18181b;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--paper);
            color: var(--ink);
            overflow-x: hidden;
        }

        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        /* HEADER */
        header {
            position: relative;
            min-height: 50vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--zinc-900);
            color: white;
            text-align: center;
            padding: 2rem 1rem;
        }

        .header-bg {
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1528127269322-539801943592?auto=format&fit=crop&q=80&w=2000') center/cover;
            opacity: 0.3;
        }

        .header-content { position: relative; z-index: 10; width: 100%; max-width: 800px; }

        .header-title {
            font-size: clamp(2rem, 6vw, 4rem);
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        /* SEARCH */
        .search-wrap {
            position: relative;
            max-width: 500px;
            margin: 1.5rem auto;
        }

        .search-wrap input {
            width: 100%;
            padding: 1rem 1.5rem;
            border-radius: 50px;
            border: none;
            font-size: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            outline: none;
        }

        /* TAB NAVIGATION - FIXED SCROLLING */
        .tab-container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            position: relative;
        }

        .tab-nav {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding: 10px 0;
            scrollbar-width: none; /* Firefox */
            -webkit-overflow-scrolling: touch; /* iOS smooth scroll */
            white-space: nowrap;
            cursor: grab;
        }

        .tab-nav::-webkit-scrollbar { display: none; }

        .tab-btn {
            flex: 0 0 auto; /* Ngăn chặn co lại */
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active-tab {
            background: var(--gold);
            color: var(--zinc-900);
            border-color: var(--gold);
        }

        /* CARDS */
        main { max-width: 1000px; margin: 0 auto; padding: 2rem 1rem; }
        .char-grid { display: flex; flex-direction: column; gap: 4rem; }

        .char-card {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.6s all ease-out;
        }

        .char-card.visible { opacity: 1; transform: translateY(0); }

        @media (min-width: 768px) {
            .char-card { grid-template-columns: 300px 1fr; }
        }

        .profile-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: sticky;
            top: 20px;
        }

        .profile-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
        .profile-info { padding: 1.5rem; text-align: center; }

        .accordions { display: flex; flex-direction: column; gap: 0.8rem; }
        details { background: white; border-radius: 10px; border: 1px solid var(--zinc-200); }
        summary { padding: 1rem; cursor: pointer; font-weight: 700; list-style: none; display: flex; justify-content: space-between; align-items: center; }
        .acc-body { padding: 0 1rem 1.5rem; line-height: 1.7; color: var(--zinc-700); text-align: justify; }

        /* TOOLTIP LIGHTWEIGHT */
        .tooltip-link {
            color: var(--red);
            font-weight: 700;
            border-bottom: 1px dashed var(--gold);
            text-decoration: none;
            cursor: pointer;
        }

        /* LOADING INDICATOR */
        #loader { text-align: center; padding: 2rem; display: none; }
    </style>
</head>
<body>

<header>
    <div class="header-bg"></div>
    <div class="header-content">
        <h1 class="header-title">Biên Niên Sử Việt</h1>
        <div class="search-wrap">
            <input type="text" id="searchInput" placeholder="Tìm tên anh hùng hoặc thời kỳ...">
        </div>
        <div class="tab-container">
            <nav class="tab-nav" id="tabNav"></nav>
        </div>
    </div>
</header>

<main>
    <div id="charGrid" class="char-grid"></div>
    <div id="loader">Đang tải thêm...</div>
</main>

<script>
    // --- DỮ LIỆU MẪU (Thay thế bằng file data.js của bạn) ---
    const DATA = [
        {
            name: "Lạc Long Quân",
            period: "Hồng Bàng",
            year: "Kỷ Hồng Bàng",
            image: "https://images.unsplash.com/photo-1621066551323-863a3434199c?w=400",
            summary: "Cha đẻ của dân tộc Việt, người lãnh đạo bộ tộc Lạc Việt.",
            biography: "Tên thật là Sùng Lãm, con trai của Kinh Dương Vương.",
            activities: "Dạy dân cách trồng trọt, ăn ở và đánh đuổi giặc ngoại xâm.",
            legacy: "Truyền thuyết Con Rồng Cháu Tiên là biểu tượng của tinh thần đoàn kết."
        },
        {
            name: "Ngô Quyền",
            period: "Nhà Ngô",
            year: "898 – 944",
            image: "https://images.unsplash.com/photo-1599508704512-2f19efd1e35f?w=400",
            summary: "Vị vua sáng lập nhà Ngô, nổi tiếng với trận Bạch Đằng năm 938.",
            biography: "Sinh ra tại Đường Lâm, là con rể của Dương Đình Nghệ.",
            activities: "Đánh tan quân Nam Hán trên sông Bạch Đằng bằng cọc nhọn.",
            legacy: "Kết thúc 1000 năm bắc thuộc, mở ra thời kỳ độc lập tự chủ."
        }
        // Thêm hàng trăm nhân vật khác vào đây vẫn sẽ chạy mượt
    ];

    // --- CẤU HÌNH ---
    let currentTab = "Tất cả";
    let visibleCount = 5; // Chỉ render 5 cái trước để nhanh
    let filteredData = [];
    
    const charGrid = document.getElementById('charGrid');
    const tabNav = document.getElementById('tabNav');
    const searchInput = document.getElementById('searchInput');

    // --- TỐI ƯU HÓA REGEX (CHỈ CHẠY 1 LẦN) ---
    // Tạo 1 regex duy nhất chứa tất cả tên nhân vật để search nhanh
    const nameMap = new Map(DATA.map(d => [d.name, d]));
    const allNamesRegex = new RegExp(`(${DATA.map(d => d.name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|')})`, 'g');

    function initApp() {
        // Init Tabs
        const periods = ["Tất cả", ...new Set(DATA.map(d => d.period))];
        tabNav.innerHTML = periods.map(p => 
            `<button class="tab-btn ${p === currentTab ? 'active-tab' : ''}" onclick="changeTab('${p}')">${p}</button>`
        ).join('');

        // Khởi tạo kéo bằng chuột cho thanh tab
        initTabDrag();
        
        filterData();
    }

    function changeTab(period) {
        currentTab = period;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active-tab', btn.textContent === period);
        });
        filterData();
    }

    // Debounce tìm kiếm để không bị lag khi gõ
    let searchTimeout;
    searchInput.addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(filterData, 300);
    });

    function filterData() {
        const q = searchInput.value.toLowerCase();
        filteredData = DATA.filter(item => {
            const matchTab = currentTab === "Tất cả" || item.period === currentTab;
            const matchSearch = !q || item.name.toLowerCase().includes(q) || item.period.toLowerCase().includes(q);
            return matchTab && matchSearch;
        });

        visibleCount = 5; // Reset số lượng hiển thị
        renderGrid();
    }

    function renderGrid() {
        const toShow = filteredData.slice(0, visibleCount);
        
        if (toShow.length === 0) {
            charGrid.innerHTML = `<div style="text-align:center; padding: 3rem; color: #666;">Không tìm thấy nhân vật nào.</div>`;
            return;
        }

        charGrid.innerHTML = toShow.map((item, index) => `
            <div class="char-card" id="card-${index}">
                <div class="profile-wrap">
                    <div class="profile-card">
                        <img src="${item.image}" alt="${item.name}" class="profile-img" loading="lazy">
                        <div class="profile-info">
                            <h2>${item.name}</h2>
                            <p style="color:var(--gold); font-weight:700; font-size:0.9rem;">${item.year}</p>
                            <p style="font-size:0.8rem; margin-top:5px; opacity:0.7">${item.period}</p>
                        </div>
                    </div>
                </div>
                <div class="accordions">
                    ${renderAccordion("Tóm lược", item.summary, true)}
                    ${renderAccordion("Tiểu sử", item.biography)}
                    ${renderAccordion("Sự nghiệp", item.activities)}
                    ${renderAccordion("Di sản", item.legacy)}
                </div>
            </div>
        `).join('');

        // Quan trọng: Chỉ thực hiện replace Link sau khi đã render xong DOM
        // và sử dụng Intersection Observer để chỉ hiển thị card khi scroll tới
        setupReveal();
    }

    function renderAccordion(title, content, open = false) {
        if (!content) return '';
        // Tối ưu: Chỉ format link khi người dùng mở chi tiết hoặc dùng hàm tối ưu hơn
        const safeContent = content.replace(allNamesRegex, `<span class="tooltip-link">$1</span>`);
        return `
            <details ${open ? 'open' : ''}>
                <summary>${title} <span>▼</span></summary>
                <div class="acc-body">${safeContent}</div>
            </details>
        `;
    }

    function setupReveal() {
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.char-card').forEach(card => observer.observe(card));
    }

    // Xử lý kéo thanh Tab bằng chuột (cho Desktop)
    function initTabDrag() {
        let isDown = false;
        let startX;
        let scrollLeft;

        tabNav.addEventListener('mousedown', (e) => {
            isDown = true;
            tabNav.style.cursor = 'grabbing';
            startX = e.pageX - tabNav.offsetLeft;
            scrollLeft = tabNav.scrollLeft;
        });
        tabNav.addEventListener('mouseleave', () => { isDown = false; });
        tabNav.addEventListener('mouseup', () => { 
            isDown = false; 
            tabNav.style.cursor = 'grab';
        });
        tabNav.addEventListener('mousemove', (e) => {
            if(!isDown) return;
            e.preventDefault();
            const x = e.pageX - tabNav.offsetLeft;
            const walk = (x - startX) * 2;
            tabNav.scrollLeft = scrollLeft - walk;
        });
    }

    // Lazy load thêm khi cuộn trang
    window.addEventListener('scroll', () => {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
            if (visibleCount < filteredData.length) {
                visibleCount += 5;
                renderGrid();
            }
        }
    });

    window.onload = initApp;
</script>
</body>
</html>
