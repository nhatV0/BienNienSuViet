<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biên Niên Sử Việt - Hành Trình Di Sản</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #D4AF37;
            --deep-red: #8B0000;
            --ink-black: #1a1a1a;
            --paper-white: #f4f1ea;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--paper-white);
            color: var(--ink-black);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        h1, h2, .serif {
            font-family: 'Playfair Display', serif;
        }

        /* Hiệu ứng trượt */
        .reveal {
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .reveal-left { transform: translateX(-80px); }
        .reveal-right { transform: translateX(80px); }
        
        .active {
            opacity: 1;
            transform: translateX(0);
        }

        /* Tooltip */
        .tooltip-link {
            border-bottom: 2px dashed var(--primary-gold);
            cursor: help;
            position: relative;
            font-weight: 600;
        }
        
        .tooltip-box {
            display: none;
            position: absolute;
            bottom: 130%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 26, 26, 0.95);
            color: white;
            padding: 12px;
            border-radius: 8px;
            width: 280px;
            z-index: 100;
            font-size: 0.85rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }
        
        .tooltip-link:hover .tooltip-box {
            display: block;
        }

        /* Timeline Line */
        .timeline-line {
            position: absolute;
            left: 50%;
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, var(--primary-gold), transparent);
            transform: translateX(-50%);
            z-index: 0;
        }

        /* Tab Active State */
        .tab-btn.active-tab {
            background-color: var(--primary-gold);
            color: white;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        @media (max-width: 768px) {
            .timeline-line { left: 20px; }
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <header class="relative h-screen flex flex-col items-center justify-center bg-zinc-900 text-white overflow-hidden">
        <div class="absolute inset-0 opacity-40">
            <img src="https://images.unsplash.com/photo-1528127269322-539801943592?auto=format&fit=crop&q=80&w=2000" class="w-full h-full object-cover" alt="Background">
        </div>
        <div class="relative z-10 text-center px-4">
            <h1 class="text-6xl md:text-8xl font-bold mb-4 tracking-tighter text-amber-500 uppercase">Biên Niên Sử Việt</h1>
            <p class="text-xl md:text-2xl font-light italic opacity-80 max-w-2xl mx-auto">"Dân ta phải biết sử ta, cho tường gốc tích nước nhà Việt Nam"</p>
        </div>
        
        <!-- Tab Navigation (Sticky bottom of header) -->
        <nav id="tabNav" class="absolute bottom-10 left-0 w-full z-20 flex justify-center gap-4 px-4 overflow-x-auto py-4 no-scrollbar">
            <!-- Tabs generated by JS -->
        </nav>
    </header>

    <!-- Sticky Sub-Nav (appears when scrolling) -->
    <div id="stickyNav" class="sticky top-0 z-50 bg-white/90 backdrop-blur-md shadow-sm hidden">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <h2 class="text-xl font-bold text-amber-600 uppercase">BNS Việt</h2>
            <div id="stickyTabs" class="flex gap-2 overflow-x-auto no-scrollbar"></div>
            <input type="text" id="searchInput" placeholder="Tìm..." class="ml-4 px-4 py-1 rounded-full bg-zinc-100 text-sm focus:outline-none focus:ring-1 focus:ring-amber-500 w-32 md:w-auto">
        </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-20 relative min-h-screen">
        <div class="timeline-line"></div>
        <div id="contentWrapper">
            <!-- Content generated by JS -->
        </div>
    </main>

    <footer class="bg-zinc-950 text-gray-500 py-16 text-center">
        <div class="max-w-7xl mx-auto px-4">
            <h3 class="serif text-2xl text-amber-500 mb-6">BIÊN NIÊN SỬ VIỆT</h3>
            <p class="max-w-xl mx-auto mb-8 text-sm">Dự án số hóa lịch sử nhằm tri ân các anh hùng dân tộc và truyền cảm hứng cho thế hệ mai sau.</p>
            <div class="flex justify-center gap-8 text-xs uppercase tracking-widest mb-8">
                <a href="#" class="hover:text-amber-500 transition">Trang chủ</a>
                <a href="#" class="hover:text-amber-500 transition">Bản đồ sử Việt</a>
                <a href="#" class="hover:text-amber-500 transition">Tài liệu tham khảo</a>
            </div>
            <p class="text-xs">© 2024 Bản quyền thuộc về cộng đồng yêu Sử Việt</p>
        </div>
    </footer>

    <!-- Script to handle data loading and UI -->
    <script>
        // Khởi tạo biến dữ liệu an toàn để tránh ReferenceError
        let HISTORICAL_DATA = window.HISTORICAL_DATA || [];
    </script>
    <script src="data.js"></script>
    <script>
        // Cập nhật lại dữ liệu sau khi load file data.js (đề phòng trường hợp load chậm)
        setTimeout(() => {
            if (window.HISTORICAL_DATA) {
                HISTORICAL_DATA = window.HISTORICAL_DATA;
                initializeApp();
            }
        }, 100);

        const contentWrapper = document.getElementById('contentWrapper');
        const tabNav = document.getElementById('tabNav');
        const stickyNav = document.getElementById('stickyNav');
        const stickyTabs = document.getElementById('stickyTabs');
        const searchInput = document.getElementById('searchInput');

        let currentTab = "Tất cả";
        let periods = [];

        function initializeApp() {
            periods = ["Tất cả", ...new Set(HISTORICAL_DATA.map(item => item.period))];
            initTabs();
            filterAndRender();
        }

        // 1. Khởi tạo Tabs
        function initTabs() {
            if (!tabNav || !stickyTabs) return;
            
            const createBtn = (p) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn px-6 py-2 rounded-full border border-amber-500/50 text-white backdrop-blur-md transition-all whitespace-nowrap text-sm font-bold uppercase tracking-widest hover:bg-amber-500 hover:text-white`;
                btn.textContent = p;
                if (p === currentTab) btn.classList.add('active-tab');
                btn.onclick = () => switchTab(p);
                return btn;
            };

            const createStickyBtn = (p) => {
                const btn = document.createElement('button');
                btn.className = `px-3 py-1 rounded-md text-xs font-bold uppercase transition-all whitespace-nowrap ${p === currentTab ? 'text-amber-600 bg-amber-50' : 'text-zinc-500 hover:text-amber-600'}`;
                btn.textContent = p;
                btn.onclick = () => switchTab(p);
                return btn;
            };

            tabNav.innerHTML = '';
            stickyTabs.innerHTML = '';
            periods.forEach(p => {
                tabNav.appendChild(createBtn(p));
                stickyTabs.appendChild(createStickyBtn(p));
            });
        }

        // 2. Chuyển Tab
        function switchTab(p) {
            currentTab = p;
            initTabs();
            filterAndRender();
            const scrollTarget = window.innerHeight - 50;
            window.scrollTo({ top: scrollTarget, behavior: 'smooth' });
        }

        // 3. Render Nội dung
        function filterAndRender() {
            const term = searchInput.value.toLowerCase();
            const filtered = HISTORICAL_DATA.filter(item => {
                const matchTab = currentTab === "Tất cả" || item.period === currentTab;
                const matchSearch = item.name.toLowerCase().includes(term) || 
                                    item.summary.toLowerCase().includes(term) ||
                                    item.tags.some(t => t.toLowerCase().includes(term));
                return matchTab && matchSearch;
            });

            renderData(filtered);
        }

        function renderData(data) {
            if (!contentWrapper) return;
            contentWrapper.innerHTML = '';
            
            if (data.length === 0) {
                contentWrapper.innerHTML = `<div class="text-center py-20 text-gray-400 italic">Không tìm thấy dữ liệu phù hợp...</div>`;
                return;
            }

            data.forEach((item, index) => {
                const section = document.createElement('section');
                section.className = `flex flex-col md:flex-row items-center mb-32 md:mb-48 relative z-10 ${item.side === 'right' ? 'md:flex-row-reverse' : ''}`;
                
                section.innerHTML = `
                    <div class="w-full md:w-1/2 p-4 md:p-12 reveal reveal-${item.side}">
                        <div class="relative group">
                            <img src="${item.image}" alt="${item.name}" class="rounded-sm shadow-2xl grayscale group-hover:grayscale-0 transition duration-700 w-full aspect-[4/5] md:aspect-video object-cover border-[12px] border-white">
                            <div class="absolute -bottom-4 -right-4 bg-amber-600 text-white px-6 py-2 font-bold shadow-xl serif text-xl">
                                ${item.year}
                            </div>
                        </div>
                    </div>

                    <div class="w-full md:w-1/2 p-8 md:p-16">
                        <div class="flex items-center gap-4 mb-4">
                            <span class="h-px w-8 bg-amber-500"></span>
                            <span class="text-amber-600 font-bold uppercase tracking-[0.2em] text-xs">${item.period}</span>
                        </div>
                        <h2 class="text-4xl md:text-5xl font-bold mb-6 text-zinc-900 leading-tight">${item.name}</h2>
                        <p class="text-lg text-amber-900/70 italic mb-8 leading-relaxed font-medium">"${item.summary}"</p>
                        <div class="text-zinc-600 leading-loose mb-10 text-justify">
                            ${formatDescription(item.description)}
                        </div>
                        <div class="flex flex-wrap gap-3">
                            ${item.tags.map(tag => `<span class="bg-zinc-100 border border-zinc-200 px-4 py-1 rounded-full text-[10px] font-bold text-zinc-500 uppercase tracking-widest hover:border-amber-300 transition-colors">#${tag}</span>`).join('')}
                        </div>
                    </div>
                `;
                contentWrapper.appendChild(section);
            });

            setupObserver();
        }

        // 4. Link & Tooltip tự động
        function formatDescription(text) {
            HISTORICAL_DATA.forEach(person => {
                const regex = new RegExp(`(?<!["' >])${person.name}(?!["' <])`, 'g');
                text = text.replace(regex, `
                    <span class="tooltip-link">
                        ${person.name}
                        <span class="tooltip-box">
                            <strong class="text-amber-500">${person.name}</strong> (${person.year})<br>
                            <span class="opacity-70 text-[10px] uppercase">${person.period}</span><br>
                            <p class="mt-2 text-zinc-300">${person.summary}</p>
                        </span>
                    </span>
                `);
            });
            return text;
        }

        // 5. Hiệu ứng cuộn
        function setupObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, { threshold: 0.15 });

            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        // 6. Xử lý Header & Sticky Nav
        window.onscroll = () => {
            if (window.scrollY > window.innerHeight - 100) {
                stickyNav.classList.remove('hidden');
            } else {
                stickyNav.classList.add('hidden');
            }
        };

        searchInput.addEventListener('input', filterAndRender);

        // Đảm bảo app chạy kể cả khi data.js load trước hoặc sau script này
        window.onload = () => {
            if (HISTORICAL_DATA.length > 0) {
                initializeApp();
            }
        };
    </script>
</body>
</html>
