<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biên Niên Sử Việt - Hành Trình Di Sản</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #D4AF37;
            --deep-red: #8B0000;
            --ink-black: #1a1a1a;
            --paper-white: #f4f1ea;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--paper-white);
            color: var(--ink-black);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        h1, h2, h3, .serif {
            font-family: 'Playfair Display', serif;
        }

        .reveal {
            opacity: 0;
            transition: all 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .reveal-left { transform: translateX(-50px); }
        .reveal-right { transform: translateX(50px); }
        
        .active {
            opacity: 1;
            transform: translateX(0);
        }

        .tab-btn.active-tab {
            background-color: var(--primary-gold);
            color: white;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
        }

        /* Tooltip */
        .tooltip-link {
            border-bottom: 2px solid var(--primary-gold);
            cursor: help;
            position: relative;
            font-weight: 600;
            color: var(--deep-red);
        }
        .tooltip-box {
            display: none;
            position: absolute;
            bottom: 130%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 26, 26, 0.98);
            color: white;
            padding: 15px;
            border-radius: 8px;
            width: 280px;
            z-index: 100;
            font-size: 0.8rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            font-weight: normal;
        }
        .tooltip-link:hover .tooltip-box { display: block; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body>

    <!-- Header Section -->
    <header class="relative h-[60vh] flex flex-col items-center justify-center bg-zinc-900 text-white">
        <div class="absolute inset-0 opacity-40">
            <img src="https://images.unsplash.com/photo-1528127269322-539801943592?auto=format&fit=crop&q=80&w=2000" class="w-full h-full object-cover" alt="Background">
        </div>
        
        <div class="relative z-10 text-center px-4 w-full max-w-4xl">
            <h1 class="text-5xl md:text-7xl font-bold mb-4 tracking-tighter text-amber-500 uppercase">Biên Niên Sử Việt</h1>
            <p class="text-lg md:text-xl font-light italic opacity-80 mb-8">Hành trình tìm về cội nguồn và những anh hùng dân tộc</p>
            
            <!-- Search Bar -->
            <div class="relative max-w-2xl mx-auto mb-8">
                <input type="text" id="searchInput" placeholder="Tìm tên anh hùng hoặc thời kỳ..." 
                    class="w-full px-8 py-4 rounded-xl bg-white text-zinc-900 shadow-2xl focus:outline-none focus:ring-2 focus:ring-amber-500 transition-all">
                <div class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-400">
                    <i data-lucide="search"></i>
                </div>
            </div>

            <!-- Navigation Tabs -->
            <nav id="tabNav" class="flex justify-center gap-2 overflow-x-auto no-scrollbar pb-2">
                <!-- Tabs generated by JS -->
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto px-4 py-16 min-h-screen">
        <div id="contentSection" class="space-y-24">
            <!-- Characters generated by JS -->
        </div>
    </main>

    <footer class="bg-zinc-900 text-zinc-500 py-12 text-center border-t border-zinc-800">
        <p class="serif text-2xl text-amber-600 mb-2">BIÊN NIÊN SỬ VIỆT</p>
        <p class="text-sm">Kiến thức lịch sử dành cho người Việt</p>
    </footer>

    <script src="data.js"></script>
    <script>
        let DATA = window.HISTORICAL_DATA || [];

        const contentSection = document.getElementById('contentSection');
        const tabNav = document.getElementById('tabNav');
        const searchInput = document.getElementById('searchInput');

        let currentTab = "Tất cả";

        function initApp() {
            const periods = ["Tất cả", ...new Set(DATA.map(d => d.period))];
            
            // Render Tabs
            tabNav.innerHTML = '';
            periods.forEach(p => {
                const btn = document.createElement('button');
                btn.className = `tab-btn px-5 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition-all ${p === currentTab ? 'active-tab' : 'text-zinc-400 hover:text-white'}`;
                btn.textContent = p;
                btn.onclick = () => {
                    currentTab = p;
                    initApp();
                };
                tabNav.appendChild(btn);
            });

            renderContent();
            lucide.createIcons();
        }

        function renderContent() {
            const query = searchInput.value.toLowerCase();
            const filtered = DATA.filter(item => {
                const matchTab = currentTab === "Tất cả" || item.period === currentTab;
                const matchSearch = item.name.toLowerCase().includes(query) || item.summary.toLowerCase().includes(query);
                return matchTab && matchSearch;
            });

            contentSection.innerHTML = '';
            
            filtered.forEach((item, index) => {
                const charCard = document.createElement('div');
                charCard.className = `reveal reveal-${item.side || 'left'} flex flex-col md:flex-row gap-8 items-start`;
                
                charCard.innerHTML = `
                    <!-- Image Card -->
                    <div class="w-full md:w-1/3 sticky top-10">
                        <div class="rounded-2xl overflow-hidden shadow-2xl border-4 border-white rotate-1 hover:rotate-0 transition-transform duration-500">
                            <img src="${item.image}" alt="${item.name}" class="w-full aspect-[3/4] object-cover">
                            <div class="bg-white p-4 text-center">
                                <h2 class="serif text-2xl font-bold text-zinc-800">${item.name}</h2>
                                <p class="text-xs text-amber-600 font-bold uppercase tracking-widest mt-1">${item.year}</p>
                            </div>
                        </div>
                    </div>

                    <!-- Accordion Info -->
                    <div class="w-full md:w-2/3 space-y-4">
                        <!-- Dạng 4 mục chính -->
                        
                        <!-- I. Tóm tắt -->
                        <details class="group bg-white rounded-2xl border border-zinc-200 overflow-hidden shadow-sm" open>
                            <summary class="flex items-center justify-between p-5 cursor-pointer list-none hover:bg-zinc-50 transition-colors">
                                <div class="flex items-center gap-3">
                                    <div class="p-2 bg-amber-600 text-white rounded-lg shadow-md"><i data-lucide="bookmark" class="w-5 h-5"></i></div>
                                    <span class="font-black text-zinc-800 uppercase tracking-tight text-sm md:text-base">I. Tóm lược nhân vật</span>
                                </div>
                                <i data-lucide="chevron-down" class="w-5 h-5 text-zinc-400 group-open:rotate-180 transition-transform"></i>
                            </summary>
                            <div class="p-6 pt-0 border-t border-zinc-100 text-zinc-700 leading-relaxed text-sm md:text-base italic font-medium text-justify">
                                ${formatLinks(item.summary)}
                            </div>
                        </details>

                        <!-- II. Tiểu sử -->
                        <details class="group bg-white rounded-2xl border border-zinc-200 overflow-hidden shadow-sm">
                            <summary class="flex items-center justify-between p-5 cursor-pointer list-none hover:bg-zinc-50 transition-colors">
                                <div class="flex items-center gap-3">
                                    <div class="p-2 bg-blue-700 text-white rounded-lg shadow-md"><i data-lucide="user" class="w-5 h-5"></i></div>
                                    <span class="font-black text-zinc-800 uppercase tracking-tight text-sm md:text-base">II. Tiểu sử & Thân thế</span>
                                </div>
                                <i data-lucide="chevron-down" class="w-5 h-5 text-zinc-400 group-open:rotate-180 transition-transform"></i>
                            </summary>
                            <div class="p-6 pt-0 border-t border-zinc-100 text-zinc-700 leading-relaxed text-sm md:text-base text-justify">
                                ${formatLinks(item.biography)}
                            </div>
                        </details>

                        <!-- III. Quá trình hoạt động -->
                        <details class="group bg-white rounded-2xl border border-zinc-200 overflow-hidden shadow-sm">
                            <summary class="flex items-center justify-between p-5 cursor-pointer list-none hover:bg-zinc-50 transition-colors">
                                <div class="flex items-center gap-3">
                                    <div class="p-2 bg-emerald-700 text-white rounded-lg shadow-md"><i data-lucide="swords" class="w-5 h-5"></i></div>
                                    <span class="font-black text-zinc-800 uppercase tracking-tight text-sm md:text-base">III. Quá trình hoạt động</span>
                                </div>
                                <i data-lucide="chevron-down" class="w-5 h-5 text-zinc-400 group-open:rotate-180 transition-transform"></i>
                            </summary>
                            <div class="p-6 pt-0 border-t border-zinc-100 text-zinc-700 leading-relaxed text-sm md:text-base text-justify">
                                ${formatLinks(item.activities)}
                            </div>
                        </details>

                        <!-- IV. Giá trị cho hiện tại -->
                        <details class="group bg-white rounded-2xl border border-zinc-200 overflow-hidden shadow-sm">
                            <summary class="flex items-center justify-between p-5 cursor-pointer list-none hover:bg-zinc-50 transition-colors">
                                <div class="flex items-center gap-3">
                                    <div class="p-2 bg-red-700 text-white rounded-lg shadow-md"><i data-lucide="heart" class="w-5 h-5"></i></div>
                                    <span class="font-black text-zinc-800 uppercase tracking-tight text-sm md:text-base">IV. Giá trị cho hiện tại</span>
                                </div>
                                <i data-lucide="chevron-down" class="w-5 h-5 text-zinc-400 group-open:rotate-180 transition-transform"></i>
                            </summary>
                            <div class="p-6 pt-0 border-t border-zinc-100 text-zinc-700 leading-relaxed text-sm md:text-base text-justify font-medium">
                                ${formatLinks(item.legacy)}
                            </div>
                        </details>
                    </div>
                `;
                contentSection.appendChild(charCard);
            });

            setupScrollReveal();
            lucide.createIcons();
        }

        // Tự động gắn tooltip khi nhắc tên nhân vật khác
        function formatLinks(text) {
            DATA.forEach(person => {
                const regex = new RegExp(`(?<!["' >])${person.name}(?!["' <])`, 'g');
                text = text.replace(regex, `
                    <span class="tooltip-link">
                        ${person.name}
                        <span class="tooltip-box">
                            <strong class="text-amber-500 text-base">${person.name}</strong><br>
                            <span class="text-[10px] text-zinc-400 uppercase">${person.period} (${person.year})</span><br>
                            <p class="mt-2 leading-snug font-normal opacity-90 text-white italic">"${person.summary}"</p>
                        </span>
                    </span>
                `);
            });
            return text;
        }

        function setupScrollReveal() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        searchInput.addEventListener('input', renderContent);

        // Khởi chạy
        window.addEventListener('load', initApp);
    </script>
</body>
</html>
